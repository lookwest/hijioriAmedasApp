name: Deploy Weather App to Firebase

on:
  schedule:
    # 毎日 日本時間 午前3:00（UTC 18:00）に実行
    - cron: '0 18 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas requests beautifulsoup4 lxml seaborn matplotlib

      - name: Update Weather Data
        run: python3 update_weather_data.py

      - name: Re-generate Boxplots and Charts
        run: |
          python3 script/plot_january_2026_snow_depth.py
          python3 script/plot_monthly_temp_boxplot.py
          python3 script/plot_january_snow_depth_boxplot.py
          python3 script/plot_january_snowfall_boxplot.py

      - name: Prepare public directory
        run: |
          mkdir -p public
          cp hijioriAmedas_data_utf8.csv public/
          cp img/*.png public/

      - name: Commit and Push if updated
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update weather data and charts" && git push)

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HIJIORIAMEDASCHART }}'
          channelId: live
          projectId: hijioriamedaschart
