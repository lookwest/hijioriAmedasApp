name: Deploy Weather App to Firebase

on:
  schedule:
    # 毎日 日本時間 午前3:00（UTC 18:00）に実行
    - cron: '0 18 * * *'
  workflow_dispatch: # 手動実行を許可
  push:
    branches:
      - main # mainブランチにプッシュされた時も実行

jobs:
  update_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み権限を明示的に許可
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.REPO_TOKEN }} # 作成した PAT を使用してチェックアウト

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas requests beautifulsoup4 lxml seaborn matplotlib

      - name: Update Weather Data
        run: python3 update_weather_data.py

      - name: Re-generate Boxplots and Charts
        run: |
          python3 script/plot_january_2026_snow_depth.py
          python3 script/plot_monthly_temp_boxplot.py
          python3 script/plot_january_snow_depth_boxplot.py
          python3 script/plot_january_snowfall_boxplot.py

      - name: Prepare public directory
        run: |
          mkdir -p public
          cp hijioriAmedas_data_utf8.csv public/
          cp img/*.png public/

      - name: Commit and Push if updated
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update weather data and charts" && git push)

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --token "${{ secrets.FIREBASE_TOKEN }}"
